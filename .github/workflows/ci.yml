name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check bin.mjs syntax
        run: node --check packages/ziku-cli/bin.mjs

      - name: Validate modules.jsonc
        run: |
          node <<'SCRIPT'
          const fs = require("fs");
          const text = fs.readFileSync(".ziku/modules.jsonc", "utf8");
          // JSONC → JSON 変換。文字列リテラル内の // や /* を誤除去しないよう、
          // 文字列 → 保持、コメント → 除去 の順で処理する。
          let result = "";
          for (let i = 0; i < text.length; i++) {
            if (text[i] === '"') {
              const start = i; i++;
              while (i < text.length && text[i] !== '"') { if (text[i] === "\\") i++; i++; }
              i++;
              result += text.slice(start, i);
              continue;
            }
            if (text[i] === "/" && text[i+1] === "/") {
              while (i < text.length && text[i] !== "\n") i++;
              continue;
            }
            if (text[i] === "/" && text[i+1] === "*") {
              i += 2;
              while (i < text.length && !(text[i] === "*" && text[i+1] === "/")) i++;
              i += 2;
              continue;
            }
            result += text[i];
          }
          // trailing comma 除去
          result = result.replace(/,\s*([\]}])/g, "$1");
          JSON.parse(result);
          console.log("modules.jsonc is valid");
          SCRIPT
