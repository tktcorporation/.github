[tools]
# Node の exact runtime pin の SSOT は .node-version (cross-tool 標準)。template で
# 参照することで、.node-version 1 ファイルの変更が mise / vp / CI
# (node-version-file: .node-version) 全てに伝搬する。
# package.json#engines.node は別 semantic (pnpm engine check 用の compat range "22")
# として独立管理する。Node major version 移行時 (例: 22→26 LTS) は両方更新する。
node = "{{ read_file(path='.node-version') | trim }}"
uv = "latest"
python = "3.14"
# pnpm は default の aqua backend を使うと pnpm v11 の release asset 形式変更
# (binary 単体配布 → tar.gz 圧縮のみ) に aqua registry が追従していないため
# `no asset found: pnpm-linux-arm64` で install が必ず失敗する (x64 も同様)。
# npm backend で固定して環境差を排除する。
"npm:pnpm" = "11"
# Rust toolchain. CI (.github/workflows/lint.yml) と揃えてバージョン固定する。
rust = "1.94.0"
# CI で使う高速テストランナー。ローカルでも cargo nextest run を再現できるようにする。
"cargo:cargo-nextest" = "latest"
jj = "latest"
process-compose = "latest"
stripe-cli = "latest"
opentofu = "latest"
flyctl = "latest"
direnv = "latest"
# infra/secrets を age で暗号化するための SOPS/age。
# age は公開鍵暗号で、秘密鍵 ~/.config/sops/age/keys.txt を root of trust とする。
# sops は YAML/env ファイルを in-place 暗号化し、decrypt した出力を tofu data source に渡す。
sops = "latest"
age = "latest"

"npm:@anthropic-ai/claude-code" = "latest"
"npm:@openai/codex" = "latest"
"npm:@google/gemini-cli" = "latest"

"npm:@antfu/ni" = "latest"

# Browser automation
"npm:playwright" = "latest"


[env]
# vite-plus は cwd が依存パッケージ配下に入ると、その package.json#engines.node を
# 見て最高 Node バージョンを選ぶため、native module の postinstall (better-sqlite3 等) が
# tests 実行時の Node と違う ABI でビルドされて NODE_MODULE_VERSION mismatch で壊れる。
# ルートに .node-version を置いても vp は依存パッケージの engines.node を優先するので、
# VP_NODE_VERSION で全コンテキストの Node を pin する。値は .node-version を SSOT とする。
VP_NODE_VERSION = "{{ read_file(path='.node-version') | trim }}"

[settings]
experimental = true
# .nvmrcファイルを自動的に読み込む設定
legacy_version_file = true
# ディレクトリ移動時に自動的にツールをインストール
auto_install = true

# pipx バックエンドで uvx を使う設定
pipx.uvx = true

[tasks.chromium-path]
run = "ls ~/.cache/ms-playwright/chromium-*/chrome-linux/chrome | head -1"
description = "Get Playwright Chromium executable path"

[tasks.ziku]
run = "npx ziku@latest"
description = "Run ziku CLI"
